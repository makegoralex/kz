name: Deploy KZ

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /var/www/kz

            echo "=== Git sync ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Root files ==="
            ls -la

            echo "=== Backend files ==="
            ls -la /var/www/kz/backend || true

            echo "=== Frontend files ==="
            ls -la /var/www/kz/frontend || true

            echo "=== Backend install ==="
            if [ -f backend/package.json ]; then
              cd /var/www/kz/backend
              cat package.json

              if [ -f package-lock.json ]; then
                npm ci || npm install
              else
                npm install
              fi
            else
              echo "backend not found, skip"
            fi

            echo "=== Frontend install/build ==="
            if [ -f frontend/package.json ]; then
              cd /var/www/kz/frontend

              if [ -f package-lock.json ]; then
                npm ci || npm install
              else
                npm install
              fi

              npm run build
            else
              echo "frontend not found, skip"
            fi

            echo "=== PM2 restart ==="
            if [ -f /var/www/kz/backend/package.json ]; then
              cd /var/www/kz/backend

              if pm2 describe kz-backend > /dev/null 2>&1; then
                pm2 restart kz-backend
              else
                pm2 start npm --name kz-backend -- start
              fi

              pm2 save
            else
              echo "backend package.json not found, skip pm2"
            fi

            echo "=== Done ==="
